services:
  kubby:
    build: .
    # Or use pre-built image:
    # image: ghcr.io/lanceli93/kubby:latest
    ports:
      - "3000:3000"
    volumes:
      - kubby-data:/data
      - /path/to/your/movies:/media  # Kubby writes NFO/poster files here
    restart: unless-stopped

volumes:
  kubby-data:
