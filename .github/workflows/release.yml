name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (tag push always builds all)"
        required: true
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - win-x64

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          ALL='{"include":[{"os":"macos-latest","platform":"darwin-arm64","artifact_name":"Kubby-arm64.dmg"},{"os":"macos-latest","platform":"darwin-x64","artifact_name":"Kubby-x64.dmg"},{"os":"windows-latest","platform":"win-x64","artifact_name":"KubbySetup.exe"}]}'
          if [ -z "$PLATFORM" ] || [ "$PLATFORM" = "all" ]; then
            echo "matrix=$ALL" >> $GITHUB_OUTPUT
          elif [ "$PLATFORM" = "darwin-arm64" ]; then
            echo 'matrix={"include":[{"os":"macos-latest","platform":"darwin-arm64","artifact_name":"Kubby-arm64.dmg"}]}' >> $GITHUB_OUTPUT
          elif [ "$PLATFORM" = "darwin-x64" ]; then
            echo 'matrix={"include":[{"os":"macos-latest","platform":"darwin-x64","artifact_name":"Kubby-x64.dmg"}]}' >> $GITHUB_OUTPUT
          elif [ "$PLATFORM" = "win-x64" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","platform":"win-x64","artifact_name":"KubbySetup.exe"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: launcher/go.mod
          cache-dependency-path: launcher/go.sum

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npx tsx scripts/package.ts --platform ${{ matrix.platform }}

      - name: Rename DMG with arch suffix (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.platform }}" = "darwin-arm64" ]; then
            mv dist/Kubby.dmg dist/Kubby-arm64.dmg
          else
            mv dist/Kubby.dmg dist/Kubby-x64.dmg
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Kubby-arm64.dmg/Kubby-arm64.dmg
            artifacts/Kubby-x64.dmg/Kubby-x64.dmg
            artifacts/KubbySetup.exe/KubbySetup.exe
