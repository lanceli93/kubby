name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            goos: darwin
            goarch: arm64
            node_platform: darwin-arm64
            ffprobe_url: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffprobe-darwin-arm64.gz"
            artifact: kubby-darwin-arm64
          - os: macos-13  # Intel Mac
            platform: darwin-x64
            goos: darwin
            goarch: amd64
            node_platform: darwin-x64
            ffprobe_url: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffprobe-darwin-x64.gz"
            artifact: kubby-darwin-x64
          - os: windows-latest
            platform: win-x64
            goos: windows
            goarch: amd64
            node_platform: win-x64
            ffprobe_url: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffprobe-win32-x64.gz"
            artifact: kubby-win-x64
          - os: ubuntu-latest
            platform: linux-x64
            goos: linux
            goarch: amd64
            node_platform: linux-x64
            ffprobe_url: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffprobe-linux-x64.gz"
            artifact: kubby-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: launcher/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npx tsx scripts/package.ts --platform ${{ matrix.platform }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path ${{ matrix.artifact }}/ -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
